l_english:
 
 MGHG_saint_fallen.01.name: "Ancient Alien Ruins on Our Home Planet"
 MGHG_saint_fallen.01.desc: "We discovered a strange ancient ruin on our home planet. The time of its birth was far earlier than the beginning of our civilization, and the level of technology it displayed reached the level of an interstellar civilization. Therefore, we speculate that this ruin may have come from aliens who visited our home planet at least ten million years ago. Was this just an accident, or is there a secret behind it?"
 MGHG_saint_fallen.01.a: "Amazing."
 
 saint_home_digsite: "Ancient Alien Ruins on Our Home Planet"
 saint_home_digsite_desc: "Traces left by aliens who visited our home planet ten million years ago, containing something worth exploring."
 
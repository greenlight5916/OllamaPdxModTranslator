l_korean:
 
 MGHG_saint_fallen.01.name: "자체 행성에 위치한 고대 외계 유적"
 MGHG_saint_fallen.01.desc: "저희는 자체 행성에서 기이한 고대 유적을 발견했습니다. 이 유적의 기원은 저희 문명의 시작보다 훨씬 이전 시대로 거슬러 올라가며, 보여주는 기술 수준은 항성 간 문명의 수준에 도달했습니다. 따라서, 이 유적이 최소 1천만 년 전 저희 행성을 방문한 외계 생명체에서 유래했을 가능성이 있다고 추측합니다. 이것이 단순한 우연이었을까요, 아니면 숨겨진 비밀이 있는 걸까요?"
 MGHG_saint_fallen.01.a: "놀랍군요."
 
 saint_home_digsite: "자체 행성에 위치한 고대 외계 유적"
 saint_home_digsite_desc: "1천만 년 전 저희 행성을 방문한 외계 생명체의 흔적으로, 탐구할 가치가 있는 무언가를 담고 있습니다."
 